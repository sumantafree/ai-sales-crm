version: "3.9"

services:
  # ── Backend API ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crm_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
      - REDIS_URL=redis://redis:6379
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - ./backend:/app
    restart: unless-stopped
    networks:
      - crm_network

  # ── Frontend ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crm_frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - backend
    networks:
      - crm_network

  # ── Redis (task queue / websocket pub-sub) ────────────────
  redis:
    image: redis:7-alpine
    container_name: crm_redis
    ports:
      - "6379:6379"
    networks:
      - crm_network

  # ── Celery Worker (background tasks) ─────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crm_worker
    command: celery -A workers.celery_app worker --loglevel=info
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - ./backend:/app
    networks:
      - crm_network

  # ── Ollama (local AI) ─────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: crm_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - crm_network

networks:
  crm_network:
    driver: bridge

volumes:
  ollama_data:
